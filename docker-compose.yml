version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: school-db-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: school_db
      MYSQL_USER: school_user
      MYSQL_PASSWORD: school_pass
    volumes:
      # Persistencia de datos
      - mysql_data:/var/lib/mysql
      # Montar TODO el repo dentro del contenedor (read-only)
      # Asi cualquier cambio en tus .sql se refleja al instante
      - ./migrations:/sql/migrations:ro
      - ./stored-procedures:/sql/stored-procedures:ro
      - ./seeds:/sql/seeds:ro
      - ./scripts:/sql/scripts:ro
      # Init script: se ejecuta solo la PRIMERA vez que se crea el volumen
      - ./scripts/docker-init.sh:/docker-entrypoint-initdb.d/99-init.sh:ro
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 5s
      timeout: 3s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:5
    container_name: school-db-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root_secret
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
